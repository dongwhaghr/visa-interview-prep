<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>미국 입국심사 인터뷰 예상 질문 · 동화일렉트로라이트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700&family=Noto+Sans+KR:wght@400;500;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF8F3;
    --card:#FFFFFF;
    --ink:#1F2421;
    --ink-soft:#5B5F58;
    --hairline:#DEDACB;
    --green:#215732;
    --green-deep:#163C22;
    --green-tint:#E7EFE6;
    --amber:#B8721F;
    --amber-tint:#FAF0E1;
    --amber-border:#E6C990;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    line-height:1.6;
    padding-bottom:80px;
  }
  .stampline{
    height:6px;
    background:repeating-linear-gradient(90deg, var(--green) 0 10px, transparent 10px 20px);
    opacity:.55;
  }
  header{
    max-width:760px;
    margin:0 auto;
    padding:44px 24px 28px;
  }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:.12em;
    color:var(--green);
    text-transform:uppercase;
    margin:0 0 10px;
  }
  h1{
    font-family:'Noto Serif KR', serif;
    font-weight:700;
    font-size:30px;
    margin:0 0 8px;
    color:var(--green-deep);
    letter-spacing:-0.01em;
  }
  .subtitle{
    color:var(--ink-soft);
    font-size:14.5px;
    margin:0 0 26px;
  }
  .searchbar{
    position:sticky;
    top:0;
    z-index:5;
    background:var(--paper);
    padding:14px 0 10px;
    border-bottom:1px solid var(--hairline);
  }
  .searchbar input{
    width:100%;
    padding:12px 16px;
    border-radius:10px;
    border:1px solid var(--hairline);
    background:var(--card);
    font-size:15px;
    font-family:inherit;
    color:var(--ink);
    outline:none;
  }
  .searchbar input:focus{
    border-color:var(--green);
    box-shadow:0 0 0 3px var(--green-tint);
  }
  .count{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--ink-soft);
    margin-top:8px;
  }
  main{
    max-width:760px;
    margin:0 auto;
    padding:8px 24px 0;
  }
  .card{
    background:var(--card);
    border:1px solid var(--hairline);
    border-radius:14px;
    margin:20px 0;
    overflow:hidden;
  }
  .card-head{
    display:flex;
    gap:16px;
    padding:20px 22px 16px;
    align-items:flex-start;
  }
  .num{
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    font-weight:500;
    color:var(--green);
    background:var(--green-tint);
    border-radius:8px;
    min-width:32px;
    height:32px;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }
  .q-en{
    font-family:'Noto Serif KR', serif;
    font-weight:500;
    font-size:17px;
    color:var(--ink);
    margin:0 0 4px;
  }
  .q-kr{
    font-size:13.5px;
    color:var(--ink-soft);
    margin:0;
  }
  .body{
    padding:0 22px 20px 70px;
  }
  .answer-block{
    margin-bottom:12px;
  }
  .label{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--green);
    margin:0 0 6px;
  }
  .answer-en{
    font-size:15.5px;
    background:var(--green-tint);
    border-radius:10px;
    padding:12px 14px;
    margin:0 0 6px;
    white-space:pre-line;
  }
  .answer-kr{
    font-size:13.5px;
    color:var(--ink-soft);
    margin:0;
    padding:0 2px;
  }
  .toggle{
    margin-top:14px;
    background:none;
    border:1px solid var(--hairline);
    color:var(--ink-soft);
    font-family:'Noto Sans KR', sans-serif;
    font-size:12.5px;
    padding:7px 12px;
    border-radius:8px;
    cursor:pointer;
  }
  .toggle:hover{
    border-color:var(--amber-border);
    color:var(--amber);
  }
  .intent{
    display:none;
    margin-top:12px;
    background:var(--amber-tint);
    border:1px solid var(--amber-border);
    border-radius:10px;
    padding:13px 15px;
    font-size:13.5px;
    color:#5A4118;
  }
  .intent.open{ display:block; }
  .intent b{ color:var(--amber); }
  .hidden{ display:none !important; }
  footer{
    max-width:760px;
    margin:36px auto 0;
    padding:0 24px;
    font-size:12px;
    color:var(--ink-soft);
    text-align:center;
  }
</style>
</head>
<body>

<div class="stampline"></div>
<header>
  <p class="eyebrow">Dongwha Electrolyte · Tennessee Dispatch</p>
  <h1>미국 입국심사 인터뷰 예상 질문</h1>
  <p class="subtitle">테네시 공장 단기 출장(설비 점검) 대비 · 질문 검색 후 추천 답변을 확인하세요</p>
</header>

<div class="searchbar">
  <div style="max-width:760px;margin:0 auto;padding:0 24px;">
    <input id="search" type="text" placeholder="키워드로 검색 (예: 급여, 체류기간, 회사)">
    <div class="count" id="count"></div>
  </div>
</div>

<main id="list"></main>

<footer>총 11개 질문 · 마지막 업데이트 2026-07-07</footer>

<script>
const data = [
  {
    q_en: "What is the purpose of your trip?",
    q_kr: "방문 목적이 무엇입니까?",
    a_en: "It's a business trip.\nI am going to check our new plant in Tennessee.\nI will train local staff for the plant mass production.",
    a_kr: "출장입니다.\n테네시 공장을 점검하러 갑니다.\n공장 대량생산을 위한 현지 직원 트레이닝 예정입니다.",
    intent: ""
  },
  {
    q_en: "What exactly will you do there?",
    q_kr: "거기서 정확히 무슨 일을 하나요?",
    a_en: "I will just check the production guidelines and train new local staffs.",
    a_kr: "생산 가이드라인을 확인하고 현지 신규 직원들 트레이닝합니다.",
    intent: ""
  },
  {
    q_en: "How long are you staying?",
    q_kr: "얼마나 머무르시나요?",
    a_en: "I'm staying about 2 months.",
    a_kr: "약 2개월 정도 머무릅니다.",
    intent: ""
  },
  {
    q_en: "Where are you staying? / Where will you stay?",
    q_kr: "어디서 지내나요?",
    a_en: "I will stay at a company house near the factory.",
    a_kr: "공장 근처 회사 숙소요.",
    intent: ""
  },
  {
    q_en: "Who is paying for your trip?",
    q_kr: "출장 비용은 누가 냅니까?",
    a_en: "My company, Dongwha Electrolyte in Korea, pays for everything.\nI receive my salary from Korea.",
    a_kr: "한국의 동화일렉트로라이트가 모두 지원합니다.\n급여도 한국에서 받습니다.",
    intent: ""
  },
  {
    q_en: "When will you go back to Korea?",
    q_kr: "한국은 언제 돌아가나요?",
    a_en: "I will return on October 4th.",
    a_kr: "10월 4일입니다.",
    intent: ""
  },
  {
    q_en: "Do you have a return ticket?",
    q_kr: "귀국 항공권을 가지고 있습니까?",
    a_en: "Yes.",
    a_kr: "네 (대답하면서 항공권 보여주기)",
    intent: ""
  },
  {
    q_en: "Where is the company located?",
    q_kr: "방문하는 회사는 어디에 있습니까?",
    a_en: "It's located in Clarksville, Tennessee.",
    a_kr: "미국 테네시주 클락스빌에 위치해 있습니다.",
    intent: ""
  },
  {
    q_en: "What does the company make?",
    q_kr: "무엇을 만드는 회사인가요?",
    a_en: "We produce electrolyte for secondary batteries.",
    a_kr: "이차전지용 전해액을 제조합니다.",
    intent: ""
  },
  {
    q_en: "Have you visited the US before?",
    q_kr: "이전에 미국에 방문한 적이 있습니까?",
    a_en: "Answer based on your own travel history.",
    a_kr: "본인의 경험에 따라 답변",
    intent: ""
  },
  {
    q_en: "How many staff are there?",
    q_kr: "직원은 몇 명입니까?",
    a_en: "There are currently about 15 employees.",
    a_kr: "현재 15명이 근무 중입니다.",
    intent: ""
  }
];

const list = document.getElementById('list');
const search = document.getElementById('search');
const count = document.getElementById('count');

function render(filter=''){
  const f = filter.trim().toLowerCase();
  list.innerHTML = '';
  let shown = 0;
  data.forEach((item, i) => {
    const haystack = (item.q_en+item.q_kr+item.a_en+item.a_kr+item.intent).toLowerCase();
    if(f && !haystack.includes(f)) return;
    shown++;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-head">
        <div class="num">${String(i+1).padStart(2,'0')}</div>
        <div>
          <p class="q-en">${item.q_en}</p>
          <p class="q-kr">${item.q_kr}</p>
        </div>
      </div>
      <div class="body">
        <div class="answer-block">
          <p class="label">recommended answer</p>
          <p class="answer-en">${item.a_en}</p>
          <p class="answer-kr">${item.a_kr}</p>
        </div>
        ${item.intent ? `
        <button class="toggle" type="button">영사의 실제 의도 보기</button>
        <div class="intent"><b>영사의 의도 및 주의사항 —</b> ${item.intent}</div>
        ` : ''}
      </div>
    `;
    const btn = card.querySelector('.toggle');
    if(btn){
      const box = card.querySelector('.intent');
      btn.addEventListener('click', () => {
        box.classList.toggle('open');
        btn.textContent = box.classList.contains('open') ? '접기' : '영사의 실제 의도 보기';
      });
    }
    list.appendChild(card);
  });
  count.textContent = f ? `${shown} / ${data.length}개 표시 중` : `총 ${data.length}개 질문`;
}

search.addEventListener('input', e => render(e.target.value));
render();
</script>

</body>
</html>
